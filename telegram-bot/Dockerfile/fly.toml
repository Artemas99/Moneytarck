# fly.toml - FinTrack Telegram Bot
# Taruh file ini di folder: telegram-bot/

app            = "smartmoney-bot"   # ganti jika nama sudah dipakai orang lain
primary_region = "sin"              # Singapore - terdekat dari Indonesia

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port       = 8080
  force_https         = false
  auto_stop_machines  = false   # PENTING: jangan auto stop!
  auto_start_machines = true
  min_machines_running = 1      # Selalu 1 instance jalan terus

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
